<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZSplit 3D Utility</title>

    <!-- CSS LINK -->
    <link rel="stylesheet" href="index.css">
     <!-- CSS LINK -->

     <!-- JS LINK -->
    <script src="script.js"></script>
     <!-- JS LINK -->   

    <!--Textimport -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
    <!--Text-->


</head>
<body>
    <h1>Welcome to ZSplit!</h1>
    <p>ZSplit is an application you can use to split your 3D models into multi-material prints.</p>
    <img id ="logo" class="logo" src="zsplit.png" alt="ZSplit Logo" class="logo">

    <form action="">

        <label class="labels" for="username">Username:</label>

        <input class="inputs" type="text" id="username" name="username" placeholder="Enter username">

        <label class="labels" for="password">Password:</label>

        <input class="inputs" type="password" id="password" name="password" placeholder="Enter password">

        <button class="buttons" type="submit">Login</button>
    </form>
</body>
</html>
